<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Attendance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* --- Header --- */
        .app-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .app-header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .email-field {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 14px;
            backdrop-filter: blur(4px);
        }
        .email-field svg { flex-shrink: 0; }
        .email-field input {
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            width: 200px;
        }
        .email-field input::placeholder { color: rgba(255,255,255,0.55); }

        /* --- Toolbar --- */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }
        .record-count {
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }
        .record-count span { color: #1e3a5f; font-weight: 700; }
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: #2563eb;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-add:hover { background: #1d4ed8; }
        .btn-add:active { transform: scale(0.97); }
        .btn-add svg { flex-shrink: 0; }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 14px 32px;
            font-size: 13px;
            border-bottom: 1px solid #fecaca;
        }

        /* --- Grid --- */
        #hot-container {
            width: 100%;
            overflow: hidden;
            background: #fff;
        }

        /* Handsontable overrides */
        .handsontable th {
            background: #f8fafc !important;
            color: #475569 !important;
            font-weight: 600 !important;
            font-size: 12px !important;
            text-transform: uppercase !important;
            letter-spacing: 0.4px !important;
            border-color: #e5e7eb !important;
        }
        .handsontable td {
            font-size: 13px !important;
            color: #1e293b !important;
            border-color: #f1f5f9 !important;
            vertical-align: middle !important;
        }
        .handsontable tr:hover td {
            background-color: #f8fafc !important;
        }

        /* Delete button inside grid */
        .btn-delete-cell {
            background: none;
            color: #94a3b8;
            border: none;
            padding: 4px 6px;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }
        .btn-delete-cell:hover {
            color: #ef4444;
            background: #fef2f2;
        }

        /* Row highlights */
        .unsaved-cell { background-color: #fffbeb !important; }
        .new-row-cell { background-color: #eff6ff !important; }

        /* --- Toast notifications --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transform: translateX(120%);
            animation: slideIn 0.3s forwards;
        }
        .toast-success { background: #059669; }
        .toast-error   { background: #dc2626; }
        .toast-fade    { animation: slideOut 0.3s forwards; }

        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        @keyframes slideOut {
            to { transform: translateX(120%); opacity: 0; }
        }

        /* --- Delete confirmation modal --- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            opacity: 0;
            animation: fadeIn 0.15s forwards;
        }
        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 28px 32px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
            transform: scale(0.95);
            animation: scaleIn 0.15s forwards;
        }
        .modal-box h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-btn {
            padding: 9px 24px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .modal-btn:active { transform: scale(0.97); }
        .modal-btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }
        .modal-btn-cancel:hover { background: #e2e8f0; }
        .modal-btn-delete {
            background: #ef4444;
            color: #fff;
        }
        .modal-btn-delete:hover { background: #dc2626; }

        @keyframes fadeIn  { to { opacity: 1; } }
        @keyframes scaleIn { to { transform: scale(1); } }
    </style>
</head>
<body>
    <header class="app-header">
        <h1>PD KPI Meeting Attendance</h1>
        <div class="header-right">
            <div class="email-field">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.7)" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                <input type="text" id="user-email-input" placeholder="your.email@lilly.com">
            </div>
        </div>
    </header>

    <div id="toast-container"></div>

    {% if error %}
        <div class="error"><strong>Error:</strong> {{ error }}</div>
    {% endif %}

    <div class="toolbar">
        <p class="record-count" id="record-count"></p>
        <button class="btn-add" id="btn-add-row">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Row
        </button>
    </div>

    <div id="hot-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.js"></script>
    <script>
        const INITIAL_DATA = {{ rows_json | safe }};

        // --- State ---
        const unsavedRows = new Set();   // set of row data object references with pending edits
        const newRows = new Set();       // set of row data object references that are unsaved new rows
        let saveTimers = {};             // debounce timers keyed by row index

        // --- Email persistence ---
        const emailInput = document.getElementById('user-email-input');
        emailInput.value = localStorage.getItem('meetingApp_userEmail') || '';
        emailInput.addEventListener('change', function() {
            localStorage.setItem('meetingApp_userEmail', this.value);
        });

        function getUserEmail() {
            return emailInput.value.trim();
        }

        // --- Toast ---
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('toast-fade'), 3000);
            setTimeout(() => container.removeChild(toast), 3500);
        }

        // --- Record count ---
        function updateCount() {
            const count = hot.countRows();
            document.getElementById('record-count').innerHTML =
                'Showing <span>' + count + '</span> record' + (count !== 1 ? 's' : '');
        }

        // --- Column config ---
        const EDITABLE_FIELDS = [
            'user_name', 'user_email', 'node_id', 'dept_id', 'role',
            'function', 'attandance_expectation', 'meeting_date',
            'attendee_type', 'primary_node_yn', 'active_yn'
        ];

        const COLUMNS = [
            { data: 'id', title: 'ID', readOnly: true, width: 1 },
            { data: 'attandance_id', title: 'Att. ID', readOnly: true, width: 80 },
            { data: 'user_name', title: 'User Name', width: 140 },
            { data: 'user_email', title: 'User Email', width: 190 },
            { data: 'node_id', title: 'Node ID', width: 90 },
            { data: 'dept_id', title: 'Dept ID', width: 90 },
            { data: 'role', title: 'Role', width: 110 },
            { data: 'function', title: 'Function', width: 110 },
            { data: 'attandance_expectation', title: 'Att. Expectation', width: 150 },
            { data: 'meeting_date', title: 'Meeting Date', width: 110 },
            { data: 'attendee_type', title: 'Attendee Type', width: 120 },
            { data: 'primary_node_yn', title: 'Primary Node', type: 'dropdown', source: ['', 'Y', 'N'], width: 105 },
            { data: 'active_yn', title: 'Active', type: 'dropdown', source: ['', 'Y', 'N'], width: 75 },
            { data: 'created_by', title: 'Created By', readOnly: true, width: 140 },
            { data: 'created_date', title: 'Created Date', readOnly: true, width: 155 },
            { data: 'modified_by', title: 'Modified By', readOnly: true, width: 140 },
            { data: 'modified_date', title: 'Modified Date', readOnly: true, width: 155 },
        ];

        // Actions column renderer
        function actionsRenderer(instance, td, row, col, prop, value, cellProperties) {
            td.innerHTML = '';
            td.style.textAlign = 'center';

            const delBtn = document.createElement('button');
            delBtn.innerHTML = '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';
            delBtn.className = 'btn-delete-cell';
            delBtn.title = 'Delete';
            delBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const physRow = instance.toPhysicalRow(row);
                deleteRecord(physRow);
            });

            td.appendChild(delBtn);
        }

        COLUMNS.push({
            data: null,
            title: 'Actions',
            readOnly: true,
            width: 50,
            renderer: actionsRenderer
        });

        // --- Handsontable init ---
        const hot = new Handsontable(document.getElementById('hot-container'), {
            data: INITIAL_DATA,
            columns: COLUMNS,
            colHeaders: COLUMNS.map(c => c.title),
            rowHeaders: true,
            hiddenColumns: {
                columns: [0],
                indicators: false,
            },
            stretchH: 'all',
            autoWrapRow: true,
            autoWrapCol: true,
            height: 'auto',
            maxRows: 1000,
            licenseKey: 'non-commercial-and-evaluation',
            manualColumnResize: true,
            columnSorting: true,
            outsideClickDeselects: false,
            className: 'htMiddle',
            cells: function(row, col, prop) {
                const cellProps = {};
                const physRow = this.instance ? this.instance.toPhysicalRow(row) : row;
                const rowData = INITIAL_DATA[physRow] || (this.instance && this.instance.getSourceDataAtRow(physRow));
                if (rowData && newRows.has(rowData)) {
                    cellProps.className = 'new-row-cell';
                } else if (rowData && unsavedRows.has(rowData)) {
                    cellProps.className = 'unsaved-cell';
                }
                return cellProps;
            },
            afterChange: function(changes, source) {
                if (!changes || source === 'loadData' || source === 'internal') return;

                const DROPDOWN_FIELDS = ['primary_node_yn', 'active_yn'];
                const dropdownRows = new Set();

                for (const [row, prop, oldVal, newVal] of changes) {
                    if (oldVal === newVal) continue;
                    const physRow = hot.toPhysicalRow(row);
                    const rowData = hot.getSourceDataAtRow(physRow);
                    if (!newRows.has(rowData)) {
                        unsavedRows.add(rowData);
                    }
                    if (DROPDOWN_FIELDS.includes(prop)) {
                        dropdownRows.add(physRow);
                    }
                }
                hot.render();

                // Auto-save dropdown changes immediately
                dropdownRows.forEach(function(physRow) {
                    saveRow(physRow);
                });
            },
            beforeKeyDown: function(event) {
                if (event.key !== 'Enter') return;

                const selected = hot.getSelected();
                if (!selected || !selected.length) return;

                const editor = hot.getActiveEditor();
                if (editor && editor.isOpened()) {
                    // Editor is open — let Handsontable close it first, then save
                    setTimeout(function() {
                        const sel = hot.getSelected();
                        if (!sel || !sel.length) return;
                        const physRow = hot.toPhysicalRow(sel[0][0]);
                        const rowData = hot.getSourceDataAtRow(physRow);
                        if (unsavedRows.has(rowData) || newRows.has(rowData)) {
                            saveRow(physRow);
                        }
                    }, 50);
                }
            },
            afterRemoveRow: function() {
                updateCount();
            },
            afterCreateRow: function() {
                updateCount();
            }
        });

        updateCount();

        // --- Save row ---
        function saveRow(physRow) {
            const email = getUserEmail();
            if (!email) {
                showToast('Please enter your email before saving.', 'error');
                return;
            }

            const rowData = hot.getSourceDataAtRow(physRow);
            if (!rowData) return;

            const payload = {};
            EDITABLE_FIELDS.forEach(f => { payload[f] = rowData[f] || null; });

            if (newRows.has(rowData)) {
                createRecord(physRow, rowData, payload, email);
            } else {
                updateRecord(physRow, rowData, payload, email);
            }
        }

        // --- Create ---
        function createRecord(physRow, rowData, payload, email) {
            payload.created_by = email;

            fetch('/api/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
            .then(({ ok, data }) => {
                if (!ok) throw new Error(data.error || 'Create failed');

                // Update row with server-generated values
                const visualRow = hot.toVisualRow(physRow);
                const fields = ['id', 'attandance_id', 'created_by', 'created_date', 'modified_by', 'modified_date'];
                fields.forEach(f => {
                    hot.setDataAtRowProp(visualRow, f, data[f], 'internal');
                });

                newRows.delete(rowData);
                unsavedRows.delete(rowData);
                hot.render();
                showToast('Record created successfully!', 'success');
            })
            .catch(err => {
                showToast('Error: ' + err.message, 'error');
            });
        }

        // --- Update ---
        function updateRecord(physRow, rowData, payload, email) {
            const recordId = rowData.id;
            if (!recordId) {
                showToast('Cannot update: no record ID.', 'error');
                return;
            }
            payload.modified_by = email;

            fetch('/api/records/' + recordId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
            .then(({ ok, data }) => {
                if (!ok) throw new Error(data.error || 'Update failed');

                const visualRow = hot.toVisualRow(physRow);
                hot.setDataAtRowProp(visualRow, 'modified_by', data.modified_by, 'internal');
                hot.setDataAtRowProp(visualRow, 'modified_date', data.modified_date, 'internal');

                unsavedRows.delete(rowData);
                hot.render();
                showToast('Record saved!', 'success');
            })
            .catch(err => {
                showToast('Error: ' + err.message, 'error');
            });
        }

        // --- Confirm modal ---
        function showConfirm(message) {
            return new Promise(function(resolve) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML =
                    '<div class="modal-box">' +
                        '<h3>Delete Record</h3>' +
                        '<p>' + message + '</p>' +
                        '<div class="modal-actions">' +
                            '<button class="modal-btn modal-btn-cancel">Cancel</button>' +
                            '<button class="modal-btn modal-btn-delete">Delete</button>' +
                        '</div>' +
                    '</div>';
                document.body.appendChild(overlay);

                overlay.querySelector('.modal-btn-cancel').addEventListener('click', function() {
                    document.body.removeChild(overlay);
                    resolve(false);
                });
                overlay.querySelector('.modal-btn-delete').addEventListener('click', function() {
                    document.body.removeChild(overlay);
                    resolve(true);
                });
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) {
                        document.body.removeChild(overlay);
                        resolve(false);
                    }
                });
            });
        }

        // --- Delete ---
        function deleteRecord(physRow) {
            const rowData = hot.getSourceDataAtRow(physRow);

            // If unsaved new row, just remove from grid
            if (newRows.has(rowData)) {
                newRows.delete(rowData);
                unsavedRows.delete(rowData);
                hot.alter('remove_row', hot.toVisualRow(physRow));
                showToast('New row removed.', 'success');
                return;
            }

            const recordId = rowData.id;
            if (!recordId) return;

            showConfirm('Are you sure you want to delete this record? This action cannot be undone.').then(function(confirmed) {
                if (!confirmed) return;

                fetch('/api/records/' + recordId, { method: 'DELETE' })
                .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
                .then(({ ok, data }) => {
                    if (!ok) throw new Error(data.error || 'Delete failed');
                    unsavedRows.delete(rowData);
                    hot.alter('remove_row', hot.toVisualRow(physRow));
                    showToast('Record deleted.', 'success');
                })
                .catch(err => {
                    showToast('Error: ' + err.message, 'error');
                });
            });
        }

        // --- Add Row ---
        document.getElementById('btn-add-row').addEventListener('click', function() {
            hot.alter('insert_row_above', 0, 1);
            const rowData = hot.getSourceDataAtRow(0);
            newRows.add(rowData);
            hot.render();
            hot.selectCell(0, 2); // focus user_name (first editable after hidden id + att_id)
        });
    </script>
</body>
</html>
